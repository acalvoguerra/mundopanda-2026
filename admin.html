<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mundopanda 2026 | Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#081a3a" />
  <link rel="stylesheet" href="styles.css?v=2026-final-1" />
</head>
<body>
  <main class="admin-shell">
    <section class="admin-panel">
      <div class="eyebrow">Zona privada · Mundopanda 2026</div>
      <h1>Actualizar clasificación</h1>
      <p>Arrastra aquí el Excel actualizado o pulsa para seleccionarlo.</p>
      <div id="authState" class="status-pill">Comprobando acceso...</div>
      <label id="dropzone" class="dropzone" for="fileInput">
        <input id="fileInput" type="file" accept=".xlsx,.xlsm,.xls" hidden />
        <span class="dropzone__icon">🏆</span>
        <strong>Subir ranking.xlsx</strong>
        <small>Hoja esperada: CLAS</small>
      </label>
      <button id="uploadBtn" class="primary-btn" disabled>Actualizar clasificación</button>
      <pre id="log" class="admin-log"></pre>
    </section>
  </main>
  <script src="config.js?v=2026-final-1"></script>
  <script src="admin.js?v=2026-final-1"></script>
</body>
</html>
