<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mundopanda 2026 | Zona privada</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="site admin-site">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <main class="admin-shell">
    <section class="upload-card">
      <div class="badge">Zona privada Mundopanda 2026</div>
      <h1>Actualizar clasificación</h1>
      <p>Arrastra aquí el Excel oficial del concurso o pulsa el botón. La subida solo funciona con enlace privado autorizado.</p>

      <div id="locked" class="status error" hidden>Acceso no autorizado. Usa el enlace privado de actualización.</div>

      <label id="dropzone" class="dropzone">
        <input id="fileInput" type="file" accept=".xlsx,.xlsm,.xls" />
        <span class="upload-icon">🏆</span>
        <strong>Arrastra el Excel aquí</strong>
        <small>o pulsa para seleccionarlo</small>
      </label>

      <button id="uploadBtn" class="primary" disabled>Actualizar clasificación</button>
      <div id="status" class="status">Esperando fichero...</div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="admin-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
