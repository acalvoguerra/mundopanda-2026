<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mundopanda 2026 | Clasificación</title>
  <meta name="theme-color" content="#081a3a" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="styles.css?v=2026-compact-1" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero__glow"></div>
      <div class="eyebrow">FIFA World Cup 2026 · Mundopanda</div>
      <h1>Clasificación Mundial 2026</h1>
      <div class="hero-stats" id="heroStats" aria-label="Resumen del ranking">
        <article><span>Líder</span><strong>-</strong></article>
        <article><span>Puntos</span><strong>-</strong></article>
        <article><span>Participantes</span><strong>-</strong></article>
      </div>
      <div class="status-pill" id="status">Cargando clasificación...</div>
    </section>

    <section class="podium" id="podium" aria-label="Podio"></section>

    <section class="ranking-card">
      <div class="ranking-header">
        <div>
          <h2>Clasificación general</h2>
          <p>Datos leídos desde ranking.xlsx · hoja CLAS</p>
        </div>
        <input id="search" class="search" type="search" placeholder="Buscar jugador..." autocomplete="off" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Jugador</th>
              <th>Puntos</th>
              <th>F. Grupos</th>
              <th>1/16</th>
              <th>1/8</th>
              <th>1/4</th>
              <th>1/2</th>
              <th>Final</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </div>
      <div id="mobileCards" class="mobile-cards"></div>
    </section>
  </main>
  <script src="config.js?v=2026-compact-1"></script>
  <script src="app.js?v=2026-compact-1"></script>
</body>
</html>
