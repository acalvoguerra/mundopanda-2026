<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mundopanda 2026 | Clasificación</title>
  <meta name="theme-color" content="#07152f" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="styles.css?v=2026-modern-3" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="public-page">
  <div class="stadium-lights"></div>
  <main class="page-shell">
    <section class="hero hero-worldcup">
      <div class="hero__badge">Mundopanda · Mundial 2026</div>
      <h1>Clasificación Mundial</h1>
      <p class="subtitle">La batalla por levantar la copa empieza aquí.</p>
      <div class="hero-actions">
        <span class="status-pill" id="status">Cargando clasificación...</span>
      </div>
    </section>

    <section class="summary-grid" id="summaryGrid" aria-label="Resumen"></section>
    <section class="podium" id="podium" aria-label="Podio"></section>

    <section class="ranking-card">
      <div class="ranking-header">
        <div>
          <p class="section-kicker">Tabla oficial</p>
          <h2>Clasificación general</h2>
        </div>
        <input id="search" class="search" type="search" placeholder="Buscar jugador..." autocomplete="off" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Jugador</th>
              <th>Puntos</th>
              <th>F. Grupos</th>
              <th>1/16</th>
              <th>1/8</th>
              <th>1/4</th>
              <th>1/2</th>
              <th>Final</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </div>
      <div id="mobileCards" class="mobile-cards"></div>
    </section>
  </main>
  <script src="config.js?v=2026-modern-3"></script>
  <script src="app.js?v=2026-modern-3"></script>
</body>
</html>
